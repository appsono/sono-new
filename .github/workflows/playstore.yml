name: Play Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: Play track
        type: choice
        default: internal
        options: [internal, alpha, beta]
      status:
        description: Release status
        type: choice
        default: draft
        options: [draft, completed]
      dry_run:
        description: Build and upload artifact only, skip Play
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  play:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: dart run scripts/compute_translation_progress.dart

      - name: Compute Play version
        id: version
        run: |
          set -euo pipefail

          BUILD=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          NAME=$(grep '^version:' pubspec.yaml | sed 's/^version: //;s/+.*//')

          # 2 digits, wrapping, keeps the code inside int32 forever
          CODE="$(date -u +%Y%m%d)$(printf '%02d' $((BUILD % 100)))"
          # 0.11.0 > 2.11.0
          PLAY_NAME="2${NAME#0}"

          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "name=$PLAY_NAME" >> "$GITHUB_OUTPUT"
          echo "pubspec $NAME+$BUILD -> play $PLAY_NAME+$CODE"

      - name: Verify version code
        env:
          CODE: ${{ steps.version.outputs.code }}
        run: |
          set -euo pipefail

          # last code shipped by the old wtf.sono.app, must be beaten
          LEGACY=2026072301
          # play rejects anything above this
          CEILING=2100000000

          if [ "$CODE" -le "$LEGACY" ]; then
            echo "::error::versionCode $CODE does not exceed legacy $LEGACY"
            exit 1
          fi
          if [ "$CODE" -ge "$CEILING" ]; then
            echo "::error::versionCode $CODE exceeds the play ceiling $CEILING"
            exit 1
          fi
          echo "versionCode $CODE ok"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/sono.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=sono.jks
          EOF

      - name: Build signed App Bundle
        run: |
          flutter build appbundle \
            --release \
            --flavor play \
            --build-name="${{ steps.version.outputs.name }}" \
            --build-number="${{ steps.version.outputs.code }}"

      - name: Locate mapping file
        id: mapping
        run: |
          FILE=build/app/outputs/mapping/playRelease/mapping.txt
          if [ -f "$FILE" ]; then
            echo "path=$FILE" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: play-${{ steps.version.outputs.name }}-${{ steps.version.outputs.code }}
          path: |
            build/app/outputs/bundle/playRelease/app-play-release.aab
            build/app/outputs/mapping/playRelease/mapping.txt
          if-no-files-found: error

      - name: Upload to Play
        if: ${{ !inputs.dry_run }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: wtf.sono.app
          releaseFiles: build/app/outputs/bundle/playRelease/app-play-release.aab
          mappingFile: ${{ steps.mapping.outputs.path }}
          track: ${{ inputs.track }}
          status: ${{ inputs.status }}
