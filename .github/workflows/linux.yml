name: Build Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmimalloc-dev libsecret-1-dev libjsoncpp-dev \
            imagemagick

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get
      - run: dart run scripts/compute_translation_progress.dart

      - run: flutter build linux --release

      - name: Bundle native libs into the app
        run: |
          for so in libmimalloc libsecret-1 libjsoncpp; do
            lib=$(ldd build/linux/x64/release/bundle/sono | awk -v n="$so" '$0 ~ n {print $3}')
            if [ -n "$lib" ]; then
              echo "bundling: $lib"
              cp -L "$lib" build/linux/x64/release/bundle/lib/
            else
              echo "skip: $so not linked"
            fi
          done

      - name: Read version
        id: v
        run: echo "version=$(grep '^version:' pubspec.yaml | awk '{print $2}')" >>
          "$GITHUB_OUTPUT"

      - name: Package portable tarball
        run: |
          mkdir -p out
          VERSION="${{ steps.v.outputs.version }}"
          tar -czf "out/sono-$VERSION-linux-x86_64.tar.gz" \
            -C build/linux/x64/release bundle

      - name: Package .deb
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          DEB=sono-deb
          mkdir -p \
            "$DEB/opt/sono" \
            "$DEB/usr/bin" \
            "$DEB/usr/share/applications" \
            "$DEB/usr/share/icons/hicolor/256x256/apps" \
            "$DEB/DEBIAN"

          cp -r build/linux/x64/release/bundle/. "$DEB/opt/sono/"
          ln -s /opt/sono/sono "$DEB/usr/bin/sono"
          convert assets/app/icon/icon_legacy.png -resize 256x256 \
            "$DEB/usr/share/icons/hicolor/256x256/apps/wtf.sono.png"

          cat > "$DEB/usr/share/applications/wtf.sono.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Sono
          Comment=Local music player
          Exec=sono
          Icon=wtf.sono
          Categories=AudioVideo;Audio;Player;
          Terminal=false
          EOF

          cat > "$DEB/DEBIAN/control" <<EOF
          Package: sono
          Version: $VERSION
          Section: sound
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0
          Maintainer: Sono <sonosupport@gmail.com>
          Description: Local-library music player
           Sono is a cross-platform local music player.
          EOF

          dpkg-deb --build --root-owner-group "$DEB" \
            "out/sono-$VERSION-linux-x86_64.deb"

      - name: Package AppImage
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp -r build/linux/x64/release/bundle/. "$APPDIR/usr/bin/"

          convert assets/app/icon/icon_legacy.png -resize 256x256 "$APPDIR/wtf.sono.png"
          cp "$APPDIR/wtf.sono.png" "$APPDIR/usr/share/icons/hicolor/256x256/apps/wtf.sono.png"

          cat > "$APPDIR/wtf.sono.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Sono
          Comment=Local music player
          Exec=sono
          Icon=wtf.sono
          Categories=AudioVideo;Audio;Player;
          Terminal=false
          EOF

          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/bin/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/sono" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          wget -q -O appimagetool \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool "$APPDIR" \
            "out/Sono-$VERSION-x86_64.AppImage"

      - uses: actions/upload-artifact@v7
        with:
          name: sono-linux
          path: out/*
