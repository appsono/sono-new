name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: dart

  build-android:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/sono.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=sono.jks
          EOF

      - name: Build signed APKs
        run: flutter build apk --release

      - name: Build signed App Bundle
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-*-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r sono-unsigned.ipa Payload

      - uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: sono-unsigned.ipa

  upload-artifacts:
    needs: [release-please, build-android, build-ios]
    if: always() && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: android-release
          path: artifacts/android

      - uses: actions/download-artifact@v7
        if: needs.build-ios.result == 'success'
        with:
          name: ios-release
          path: artifacts/ios

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            artifacts/android/**/*
            artifacts/ios/sono-unsigned.ipa
