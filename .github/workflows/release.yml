name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for version change
        id: version
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          git show HEAD~1:pubspec.yaml > /tmp/old_pubspec.yaml 2>/dev/null || true
          OLD=$(grep '^version:' /tmp/old_pubspec.yaml 2>/dev/null | awk '{print $2}')

          echo "old=$OLD"
          echo "current=$CURRENT"

          if [ "$CURRENT" != "$OLD" ] && [ -n "$CURRENT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "tag=v$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/sono.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=sono.jks
          EOF

      - name: Build signed APKs
        run: flutter build apk --release --flavor prod

      - name: Build signed App Bundle
        run: flutter build appbundle --release --flavor prod

      - uses: actions/upload-artifact@v7
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-prod-*-release.apk
            build/app/outputs/flutter-apk/app-prod-releasea.pk
            build/app/outputs/bundle/prodRelease/app-prod-release.aab

  build-ios:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r sono-unsigned.ipa Payload

      - uses: actions/upload-artifact@v7
        with:
          name: ios-release
          path: sono-unsigned.ipa

  release:
    needs: [check-version, build-android, build-ios]
    if: always() && needs.build-android.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: android-release
          path: artifacts/android

      - uses: actions/download-artifact@v7
        if: needs.build-ios.result == 'success'
        with:
          name: ios-release
          path: artifacts/ios

      - name: Create tag
        run: |
          git tag "${{ needs.check-version.outputs.tag }}"
          git push origin "${{ needs.check-version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          files: |
            artifacts/android/**/*
            artifacts/ios/sono-unsigned.ipa
          generate_release_notes: true
